<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Beragam Sewa Bali</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" id="favicon" href="/favicon.png">
    <link rel="stylesheet" href="/src/style/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-outfit bg-bg-soft text-brand-dark antialiased">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-brand-dark">
        <div class="bg-white rounded-[3rem] p-12 w-full max-w-[420px] shadow-2xl text-center">
            <img id="login-logo" src="/src/assets/images/logos.png" class="w-20 h-20 mx-auto mb-6">
            <h2 class="text-2xl font-black mb-2 tracking-tight">Admin Portal</h2>
            <p class="text-gray-400 text-sm mb-10">Sign in to manage your content</p>
            <form id="login-form">
                <input type="email" id="admin-email" class="input-control mb-4 text-center" placeholder="Enter Admin Email" required>
                <input type="password" id="admin-password" class="input-control mb-6 text-center" placeholder="Enter Access Password" required>
                <button type="submit" class="btn-main btn-dark w-full">Authorize Access</button>
            </form>
        </div>
    </div>

    <!-- MAIN PANEL -->
    <div id="admin-panel" class="hidden min-h-screen">
        <nav class="bg-white/80 backdrop-blur-md border-b border-black/5 px-10 py-5 sticky top-0 z-[100]">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img id="nav-logo" src="/src/assets/images/logos.png" class="w-9 h-9">
                    <span class="font-black text-xl tracking-tight">BSB <span class="text-brand-red">Admin</span></span>
                </div>
                <button id="logout-btn" class="text-xs font-bold text-gray-400 hover:text-brand-red transition-colors">Sign Out <i class="fa-solid fa-right-from-bracket ml-1"></i></button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-8 py-16">
            <header class="mb-12">
                <h1 class="text-4xl font-black tracking-tight mb-3">Dashboard Manager</h1>
                <p class="text-gray-400 font-medium">Elevate your Bali rental business experience.</p>
            </header>

            <!-- TABS (PILL STYLE) -->
            <div class="flex p-1.5 bg-gray-200/50 rounded-2xl w-fit mb-12 gap-1 overflow-x-auto no-scrollbar">
                <button class="tab-btn active" data-target="#hero-content">Hero Assets</button>
                <button class="tab-btn" data-target="#about-content">Company Story</button>
                <button class="tab-btn" data-target="#services-content">Our Services</button>
                <button class="tab-btn" data-target="#packages-content">Tour Packages</button>
                <button class="tab-btn" data-target="#gallery-content">Media Gallery</button>
            </div>

            <!-- SECTIONS -->
            <div class="tab-content-wrapper">
                
                <!-- HERO SECTION -->
                <div id="hero-content" class="tab-content-pane active">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div class="premium-card">
                            <h3 class="text-lg font-black mb-8 flex items-center gap-3"><span class="w-1.5 h-6 bg-brand-red rounded-full"></span>Hero Text</h3>
                            <form id="hero-form" class="space-y-6">
                                <div><label class="input-label">Main Headline</label><input type="text" id="hero-title-input" class="input-control"></div>
                                <div><label class="input-label">Sub-Headline Description</label><textarea id="hero-subtitle-input" class="input-control" rows="4"></textarea></div>
                                <button type="submit" class="btn-main btn-dark">Update Content</button>
                            </form>
                        </div>
                        <div class="premium-card">
                            <h3 class="text-lg font-black mb-8 flex items-center gap-3"><span class="w-1.5 h-6 bg-brand-red rounded-full"></span>Background Slides</h3>
                            <div id="hero-slider-list" class="space-y-3 mb-8"></div>
                            <div class="p-8 bg-bg-soft rounded-3xl border-2 border-dashed border-gray-200 text-center">
                                <input type="file" id="hero-image-upload" class="hidden" accept="image/*">
                                <label for="hero-image-upload" class="text-xs font-bold text-brand-red cursor-pointer block mb-6 hover:underline">Click to browse slide image</label>
                                <button type="button" id="btn-upload-hero" class="btn-main btn-success w-full">Upload New Slide</button>
                            </div>
                        </div>
                    </div>
                    <div class="premium-card mt-10">
                        <h3 class="text-lg font-black mb-8 flex items-center gap-3"><span class="w-1.5 h-6 bg-brand-red rounded-full"></span>Site Logo</h3>
                        <div class="flex flex-col items-center p-8 bg-bg-soft rounded-3xl border-2 border-dashed border-gray-200 text-center">
                            <div class="w-24 h-24 bg-white rounded-2xl shadow-sm border border-black/5 flex items-center justify-center overflow-hidden mb-6">
                                <img id="admin-site-logo-preview" src="/src/assets/images/logos.png" class="w-full h-full object-contain">
                            </div>
                            <input type="file" id="logo-upload" class="hidden" accept="image/*">
                            <label for="logo-upload" class="text-xs font-bold text-brand-red cursor-pointer block mb-6 hover:underline">Click to browse new logo image</label>
                            <button type="button" id="btn-upload-logo" class="btn-main btn-success w-full">Update Site Logo</button>
                        </div>
                    </div>
                </div>

                <!-- ABOUT SECTION -->
                <div id="about-content" class="tab-content-pane">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div class="premium-card">
                            <h3 class="text-lg font-black mb-8 flex items-center gap-3"><span class="w-1.5 h-6 bg-brand-red rounded-full"></span>Our Story</h3>
                            <form id="about-form" class="space-y-6">
                                <div><label class="input-label">Section Title</label><input type="text" id="about-title-input" class="input-control"></div>
                                <div><label class="input-label">Detail Narrative</label><textarea id="about-text-input" class="input-control" rows="8"></textarea></div>
                                <button type="submit" class="btn-main btn-dark">Save Changes</button>
                            </form>
                        </div>
                        <div class="premium-card">
                            <h3 class="text-lg font-black mb-8 flex items-center gap-3"><span class="w-1.5 h-6 bg-brand-red rounded-full"></span>Gallery Showcase</h3>
                            <div id="about-carousel-list" class="space-y-3 mb-8"></div>
                            <div class="p-8 bg-bg-soft rounded-3xl border-2 border-dashed border-gray-200 text-center">
                                <input type="file" id="about-image-upload" class="hidden" accept="image/*">
                                <label for="about-image-upload" class="text-xs font-bold text-brand-red cursor-pointer block mb-6 hover:underline">Click to browse image</label>
                                <button type="button" id="btn-upload-about" class="btn-main btn-success w-full">Add to Showcase</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SERVICES SECTION -->
                <div id="services-content" class="tab-content-pane">
                    <div class="flex items-center justify-between mb-10">
                        <h3 class="text-2xl font-black">Service Unit Inventory</h3>
                        <button id="add-service-btn" class="btn-main btn-success px-8 shadow-emerald-100"><i class="fa-solid fa-plus"></i> New Service Card</button>
                    </div>
                    <div id="services-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
                </div>

                <!-- PACKAGES SECTION -->
                <div id="packages-content" class="tab-content-pane">
                    <div class="flex items-center justify-between mb-10">
                        <h3 class="text-2xl font-black">Tour Package Offers</h3>
                        <button id="add-package-btn" class="btn-main btn-success px-8 shadow-emerald-100"><i class="fa-solid fa-plus"></i> New Package Card</button>
                    </div>
                    <div id="packages-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
                </div>

                <!-- GALLERY SECTION -->
                <div id="gallery-content" class="tab-content-pane">
                    <div class="premium-card p-12 text-center border-2 border-dashed border-gray-200 bg-white/50">
                        <i class="fa-solid fa-cloud-arrow-up text-5xl text-gray-200 mb-6 block"></i>
                        <input type="file" id="gallery-image-upload" class="hidden" accept="image/*" multiple>
                        <label for="gallery-image-upload" class="text-base font-bold text-brand-red cursor-pointer block mb-8 hover:underline">Drag or click to select multiple media</label>
                        <button type="button" id="btn-upload-gallery" class="btn-main btn-dark px-16">Execute Bulk Upload</button>
                    </div>
                    <div id="gallery-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 mt-16"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- UNIVERSAL MODAL -->
    <div id="admin-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="px-10 py-7 bg-bg-soft border-b border-black/5 flex items-center justify-between">
                <h5 class="font-black text-xl tracking-tight" id="modal-title">Item Configuration</h5>
                <button type="button" class="close-modal-btn text-gray-400 text-4xl leading-none hover:text-brand-red transition-colors">&times;</button>
            </div>
            <form id="modal-form" class="p-10">
                <input type="hidden" id="modal-id-input">
                <input type="hidden" id="modal-type-input">
                <div class="mb-6">
                    <label class="input-label">Identify Name / Title</label>
                    <input type="text" id="modal-title-input" class="input-control" required placeholder="e.g., Luxury Van Hire">
                </div>
                <div class="mb-6">
                    <label class="input-label">Short Summary (for Cards)</label>
                    <textarea id="modal-text-input" class="input-control" rows="3" required placeholder="Short catchphrase..."></textarea>
                </div>
                <div class="mb-6">
                    <label class="input-label">Detailed Description (for Detail Page)</label>
                    <textarea id="modal-long-text-input" class="input-control" rows="6" required placeholder="Complete detailed specs and info..."></textarea>
                </div>
                <div class="mb-10">
                    <label class="input-label">Display Media</label>
                    <input type="file" id="modal-image-input" class="block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-gray-100 file:text-brand-dark">
                </div>
                <div class="flex gap-4">
                    <button type="submit" class="btn-main btn-dark flex-[2] py-4">Commit Changes</button>
                    <button type="button" class="btn-main btn-outline flex-1 close-modal-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3000' 
            : '';
        async function checkAuth() {
            try {
                const res = await fetch(`${API}/api/admin/status`, { credentials: 'include' });
                const data = await res.json();
                if (data.loggedIn) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('admin-panel').classList.remove('hidden');
                    if (window.initAdmin) window.initAdmin();
                }
            } catch (e) {}
        }
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const res = await fetch(`${API}/api/admin/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                credentials: 'include', body: JSON.stringify({ email, password })
            });
            if (res.ok) location.reload(); else alert('Invalid Credentials');
        });
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch(`${API}/api/admin/logout`, { method: 'POST', credentials: 'include' });
            location.reload();
        });
        checkAuth();
    </script>
    <script src="admin.js"></script>
</body>
</html>
